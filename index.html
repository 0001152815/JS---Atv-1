<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Título da Página</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 1. Botão de boas-vindas -->
<button id="botao">Clique para receber uma mensagem</button>

<br><br>

<!-- 2. Botão para alterar texto -->
<p id="texto">Este é um site sobre tecnologia.</p>
<button id="botao1">Alterar o texto</button>

<br><br>

<!-- 3. Botão para alterar cor -->
<p id="corTexto">Este texto pode mudar de cor.</p>
<button id="botao2">Alterar cor</button>

<br><br>

<!-- 4. Mostrar e esconder conteúdo -->
<p id="conteudo">Este conteúdo pode ser escondido.</p>
<button id="botao3">Mostrar / Esconder</button>

<br><br>

<!-- 5. Botão de interação com menu -->
<button id="botao4">Abrir Menu</button>

<ul id="menu">
<li>Home</li>
<li>Sobre</li>
<li>Contato</li>
</ul>

<br><br>

<!-- 6. Alterar imagem ao passar mouse -->
<img id="imagem"
src="https://picsum.photos/200"
width="200">

<script src="script.js"></script>

</body>
</html>
